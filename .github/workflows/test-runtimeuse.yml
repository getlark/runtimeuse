name: Test runtimeuse

on:
  push:
    branches: [main]
    paths:
      - "packages/runtimeuse/**"
  pull_request:
    paths:
      - "packages/runtimeuse/**"

defaults:
  run:
    working-directory: packages/runtimeuse

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/runtimeuse/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
